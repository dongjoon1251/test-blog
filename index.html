<!doctype html>
<html lang=ko>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .agent { margin-top: 24px; padding: 14px; border: 1px dashed #ff7a3d; border-radius: 8px; background: #fff8f3; max-width: 480px; }
        .agent h2 { font-size: 15px; margin: 0 0 8px; }
        .agent .out { white-space: pre-wrap; font-size: 14px; line-height: 1.55; margin-top: 10px; min-height: 20px; color: #444; }
        .agent .err { color: #c33; }
    </style>
</head>
<body>
<h1>메모 2</h1>
<input id=t>
<button onclick="add()">추가</button>
<ul id=l></ul>

<!-- + 에이전트: 지금까지 쓴 메모를 요약해 위로 한마디 -->
<section class="agent">
    <h2>🤖 메모 요약 · 위로 한마디</h2>
    <button id="btn-agent" type="button">요약해줘</button>
    <div id="agent-out" class="out"></div>
</section>

<!-- + RAG: 메모를 벡터 검색해서 질문에 답 (Supabase pgvector) -->
<section class="agent">
    <h2>🔎 메모에게 물어보기 (RAG · 벡터 검색)</h2>
    <input id="q" placeholder="예: 테스트에 대해 뭐라고 썼지?" style="width:100%;box-sizing:border-box;margin-bottom:6px">
    <button id="btn-ask" type="button">질문</button>
    <div id="ask-out" class="out"></div>
</section>

<script>
const { createClient } = supabase;
let db;  // /api/config 에서 URL·키를 받아온 뒤 생성 (키를 코드에 안 넣기 위함)

async function init() {
    const { url, anonKey } = await (await fetch("/api/config")).json();
    if (!url || !anonKey) {
        alert("Supabase 설정이 없어요. Vercel 대시보드에 SUPABASE_URL, SUPABASE_ANON_KEY 를 등록하고 재배포하세요.");
        return;
    }
    db = createClient(url, anonKey);
    await db.auth.signInAnonymously();
    loadFromSupabase();
}

async function add() {
    const memoText = t.value.trim();
    if (!memoText) return;
    // 서버(/api/add)가 임베딩을 만들어 Supabase(pgvector)에 저장 — 그래야 나중에 벡터 검색 가능
    const r = await fetch("/api/add", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ text: memoText })
    });
    if (!r.ok) { alert("메모 저장 실패"); return; }
    let li = document.createElement('li');
    li.textContent = memoText;
    l.appendChild(li);
    t.value = '';
}

async function loadFromSupabase() {
    const { data: items, error } = await db.from('memos').select('text');
    if (error) {
        console.error(error);
        return;
    }
    items.forEach(item => {
        let li = document.createElement('li');
        li.textContent = item.text;
        l.appendChild(li);
    });
}

init();

// + 에이전트 호출: 프론트는 서버 함수만 호출. API 키는 서버에만 존재.
const $btn = document.getElementById("btn-agent");
const $out = document.getElementById("agent-out");
$btn.addEventListener("click", async () => {
    const notes = [...l.querySelectorAll("li")].map(li => li.textContent);
    if (notes.length === 0) { $out.textContent = "먼저 메모를 하나라도 남겨봐."; return; }
    $btn.disabled = true; $out.textContent = "생각 중...";
    try {
        const r = await fetch("/api/agent", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ notes })
        });
        if (!r.ok) throw new Error("서버 오류: " + r.status);
        const { reply } = await r.json();
        $out.textContent = reply;
        $out.classList.remove("err");
    } catch (e) {
        $out.textContent = "에이전트가 답을 못 했어. 잠시 후 다시 시도해줘.";
        $out.classList.add("err");
        console.error(e);
    } finally {
        $btn.disabled = false;
    }
});

// + RAG 호출: 질문만 서버로 → 서버가 벡터 검색 후 답변. 검색·생성 모두 서버에서.
const $ask = document.getElementById("btn-ask");
const $askOut = document.getElementById("ask-out");
$ask.addEventListener("click", async () => {
    const question = document.getElementById("q").value.trim();
    if (!question) { $askOut.textContent = "질문을 입력해줘."; return; }
    $ask.disabled = true; $askOut.textContent = "메모 검색 중...";
    try {
        const r = await fetch("/api/ask", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ question })
        });
        if (!r.ok) throw new Error("서버 오류: " + r.status);
        const { answer, used } = await r.json();
        $askOut.textContent = answer + (used && used.length ? "\n\n📎 근거 메모:\n- " + used.join("\n- ") : "");
        $askOut.classList.remove("err");
    } catch (e) {
        $askOut.textContent = "답을 못 했어. 잠시 후 다시 시도해줘.";
        $askOut.classList.add("err");
        console.error(e);
    } finally {
        $ask.disabled = false;
    }
});
</script>
</body>
</html>
